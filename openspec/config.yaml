schema: spec-driven

context: |
  Tech stack: Node.js 22+, TypeScript, Fastify, Vitest, Biome
  Domain-driven architecture: src/domains/ with routes, services, types

  For validation always use DevTools or Playwriter to navigate, snapshot,
  analyze network requests, and test selectors on target websites.

rules:
  proposal:
    - Identify affected domain(s)
    - Take into account the project documentation `docs/`
  tasks:
    - Add tests for each scenario
    - After implementing changes, run `npm run check` to validate
